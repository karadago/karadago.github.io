<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="noindex, nofollow, width=device-width, initial-scale=1.0">
    <title>Interactive 3D Structural Design Tool</title>
    <style>

        .lil-gui { 
            --background-color: #2b2b2b;
            --text-color: #eee;
            --title-background-color: #1a1a1a;
            --widget-color: #444;
            --hover-color: #555;
            --focus-color: #007bff;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .lil-gui .title { font-weight: 600; letter-spacing: 0.5px; }

        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; }
        #info {
            position: absolute; top: 15px; left: 15px; color: #333;
            background: rgba(255,255,255,0.9); padding: 15px 20px; border-radius: 8px;
            pointer-events: none; z-index: 100; border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h3 { margin: 0 0 8px 0; color: #0056b3; font-size: 18px;}
        p { margin: 0; font-size: 13px; color: #666; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h3>Interactive 3D Structural Design Tool</h3>
        <p>Left-click: Rotate | Right-click: Pan | Scroll: Zoom</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJExporter } from 'three/addons/exporters/OBJExporter.js';
        import GUI from 'lil-gui';

        // --- Scene & Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const groundGeo = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x8fbc8f, depthWrite: false });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        scene.add(ground);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.localClippingEnabled = true; 
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 25, 40);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(10, 5, 10);

        controls.enableDamping = true; 
        controls.dampingFactor = 0.05; 
        controls.zoomSpeed = 0.4;      

        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(30, 50, 20);
        scene.add(dirLight);

        // --- Groups ---
        const buildingGroup = new THREE.Group();
        scene.add(buildingGroup);
        const gridGroup = new THREE.Group();
        scene.add(gridGroup);

        // --- Parameters ---
        const params = {
            structuralMaterial: 'Reinforced Concrete',
            storyCount: 2,
            basementCount: 0,
            storyHeight: 3.5,
            gridCountX: 3,
            gridCountY: 2,
            spanX: 10.0,
            spanY: 6.0,
            columnSize: 0.5,
            slabType: 'Pre-tensioned Precast (Double Tee)',
            
            cutAxis: 'Y-Axis (Depth)',
            sectionCut: 40, 
            colorCoded: true,
            
            flatThickness: 0.25,
            beamSlabThickness: 0.15,
            wafflePlateThickness: 0.1,
            waffleRibWidth: 0.15,
            waffleRibHeight: 0.35,
            waffleRibSpacing: 1.0,
        };

        // --- Materials & Colors ---
        // Default normal points along -Z (Architectural Y-Axis)
        const sectionPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 40);
        
        const matSettings = { 
            roughness: 0.8, side: THREE.DoubleSide, clippingPlanes: [sectionPlane],
            polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 
        };

        const materials = {
            column: new THREE.MeshStandardMaterial({ color: 0x4a6fa5, ...matSettings }), 
            slab: new THREE.MeshStandardMaterial({ color: 0xdde6ed, ...matSettings }),   
            beam: new THREE.MeshStandardMaterial({ color: 0x164863, ...matSettings }),   
            drop: new THREE.MeshStandardMaterial({ color: 0x9db2bf, ...matSettings }),   
            rib: new THREE.MeshStandardMaterial({ color: 0xdde6ed, ...matSettings }),    
            dt: new THREE.MeshStandardMaterial({ color: 0xdde6ed, ...matSettings }),     
            pt: new THREE.MeshStandardMaterial({ color: 0xd9534f, roughness: 0.3, metalness: 0.2, clippingPlanes: [sectionPlane] }) 
        };

        const defaultConcrete = new THREE.MeshStandardMaterial({ color: 0xcccccc, ...matSettings });
        
        const edgeMaterial = new THREE.LineBasicMaterial({ 
            color: 0x333333, linewidth: 1, clippingPlanes: [sectionPlane] 
        });

        function getMat(type) {
            return params.colorCoded ? materials[type] : defaultConcrete;
        }

        // --- Helpers ---
const backStencilMat = new THREE.MeshBasicMaterial({
            depthWrite: false, depthTest: false, colorWrite: false,
            stencilWrite: true, stencilFunc: THREE.AlwaysStencilFunc,
            side: THREE.BackSide,
            stencilFail: THREE.IncrementWrapStencilOp, stencilZFail: THREE.IncrementWrapStencilOp, stencilZPass: THREE.IncrementWrapStencilOp,
            clippingPlanes: [sectionPlane]
        });
        
        const frontStencilMat = new THREE.MeshBasicMaterial({
            depthWrite: false, depthTest: false, colorWrite: false,
            stencilWrite: true, stencilFunc: THREE.AlwaysStencilFunc,
            side: THREE.FrontSide,
            stencilFail: THREE.DecrementWrapStencilOp, stencilZFail: THREE.DecrementWrapStencilOp, stencilZPass: THREE.DecrementWrapStencilOp,
            clippingPlanes: [sectionPlane]
        });

        // The solid grey "fill" color for the cut section
        const capMat = new THREE.MeshStandardMaterial({
            color: 0x444444, roughness: 1.0, side: THREE.DoubleSide,
            stencilWrite: true, stencilRef: 0, stencilFunc: THREE.NotEqualStencilFunc,
            stencilFail: THREE.ReplaceStencilOp, stencilZFail: THREE.ReplaceStencilOp, stencilZPass: THREE.ReplaceStencilOp,
        });

        const capGeo = new THREE.PlaneGeometry(200, 200);
        const capMesh = new THREE.Mesh(capGeo, capMat);
        capMesh.renderOrder = 1;
        scene.add(capMesh);

        // --- Updated Helpers ---
        function createSolidWithEdges(geometry, material) {
            const group = new THREE.Group();
            
            const mesh = new THREE.Mesh(geometry, material);
            group.add(mesh);
            
            // Add invisible stencil meshes to cap the hollow geometry
            const bMesh = new THREE.Mesh(geometry, backStencilMat);
            const fMesh = new THREE.Mesh(geometry, frontStencilMat);
            bMesh.renderOrder = -1; 
            fMesh.renderOrder = -1;
            group.add(bMesh, fMesh);

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, edgeMaterial);
            group.add(line);
            
            return group;
        }

        function clearGroup(group) {
            while(group.children.length > 0) {
                const child = group.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.children.length > 0) clearGroup(child);
                group.remove(child);
            }
        }

        // --- Scale Figure ---
// --- Scale Figure ---
        function createScaleFigure() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Draw a classic architectural silhouette
            ctx.fillStyle = '#3a3a3a'; 
            ctx.beginPath();
            
            // Head
            ctx.arc(32, 18, 9, 0, Math.PI * 2);
            
            // Shoulders & Torso (Coat profile)
            ctx.moveTo(20, 32);
            ctx.quadraticCurveTo(32, 28, 44, 32); 
            ctx.lineTo(38, 75); 
            ctx.lineTo(26, 75); 
            
            // Left Leg
            ctx.moveTo(26, 75);
            ctx.lineTo(28, 122);
            ctx.lineTo(21, 122);
            ctx.lineTo(24, 75);
            
            // Right Leg
            ctx.moveTo(38, 75);
            ctx.lineTo(43, 122);
            ctx.lineTo(36, 122);
            ctx.lineTo(34, 75);
            
            ctx.fill();
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            
            // Set exact height to 1.78m, width scaled proportionally
            sprite.scale.set(1.78 * (64/128), 1.78, 1); 
            sprite.position.set(-2, 1.78 / 2, -2); 
            scene.add(sprite);
        }
        createScaleFigure();

        // --- Export Logic ---
        const exportActions = {
            exportOBJ: function() {
                const exporter = new OBJExporter();
                const result = exporter.parse(buildingGroup);
                const blob = new Blob([result], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = 'structure.obj'; link.click();
                URL.revokeObjectURL(url);
            }
        };

        const fileActions = {
            saveProgress: function() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(params));
                const link = document.createElement('a');
                link.href = dataStr;
                link.download = 'save.json';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },
            loadProgress: function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = e => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = event => {
                        try {
                            const loadedParams = JSON.parse(event.target.result);
                            Object.assign(params, loadedParams);
                            
                            gui.controllersRecursive().forEach(c => c.updateDisplay());
                            updateDynamicGUI();
                            generateBuilding();
                        } catch (err) {
                            alert('Invalid save file.');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
        };

        // --- Main Geometry Generation ---
        function generateBuilding() {
            clearGroup(buildingGroup);
            clearGroup(gridGroup);

            const totalWidth = params.gridCountX * params.spanX;
            const totalDepth = params.gridCountY * params.spanY;
            
            const boundMinX = -params.columnSize / 2;
            const boundMaxX = totalWidth + params.columnSize / 2;
            const boundMinY = -params.columnSize / 2;
            const boundMaxY = totalDepth + params.columnSize / 2;

            // 0. Reference Lines
            const dashMat = new THREE.LineDashedMaterial({ color: 0x999999, dashSize: 0.5, gapSize: 0.5 });
            for (let y = 0; y <= params.gridCountY; y++) {
                const pts = [new THREE.Vector3(-2, 0, y*params.spanY), new THREE.Vector3(totalWidth+2, 0, y*params.spanY)];
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), dashMat);
                line.computeLineDistances(); gridGroup.add(line);
            }
            for (let x = 0; x <= params.gridCountX; x++) {
                const pts = [new THREE.Vector3(x*params.spanX, 0, -2), new THREE.Vector3(x*params.spanX, 0, totalDepth+2)];
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), dashMat);
                line.computeLineDistances(); gridGroup.add(line);
            }

            // --- 1. RAFT FOUNDATION ---
            const lowestY = -params.basementCount * params.storyHeight;
            const raftThickness = params.storyCount <= 4 ? 0.40 : (params.storyCount * 0.10);
            const overhang = 0.5; // Raft extends 50cm past outer column faces
            
            const raftGeo = new THREE.BoxGeometry(
                (boundMaxX - boundMinX) + (overhang * 2), 
                raftThickness, 
                (boundMaxY - boundMinY) + (overhang * 2)
            );
            const raft = createSolidWithEdges(raftGeo, getMat('drop'));
            raft.position.set(totalWidth/2, lowestY - raftThickness/2, totalDepth/2);
            buildingGroup.add(raft);

            // --- 2. COLUMNS & BASEMENT SHEAR WALLS ---
            const colGeo = new THREE.BoxGeometry(params.columnSize, params.storyHeight, params.columnSize);
            
            // Loop starting from deepest basement up to the top floor
            for (let s = -params.basementCount; s < params.storyCount; s++) {
                const yPos = (s * params.storyHeight) + (params.storyHeight / 2);
                const isBasement = s < 0;

                // Draw perimeter shear walls for basements
                if (isBasement) {
                    const wallGeoX = new THREE.BoxGeometry(boundMaxX - boundMinX, params.storyHeight, params.columnSize);
                    const wallGeoY = new THREE.BoxGeometry(params.columnSize, params.storyHeight, (boundMaxY - boundMinY) - (params.columnSize * 2));
                    
                    const frontWall = createSolidWithEdges(wallGeoX, getMat('column'));
                    frontWall.position.set(totalWidth/2, yPos, 0);
                    buildingGroup.add(frontWall);

                    const backWall = createSolidWithEdges(wallGeoX, getMat('column'));
                    backWall.position.set(totalWidth/2, yPos, totalDepth);
                    buildingGroup.add(backWall);

                    const leftWall = createSolidWithEdges(wallGeoY, getMat('column'));
                    leftWall.position.set(0, yPos, totalDepth/2);
                    buildingGroup.add(leftWall);

                    const rightWall = createSolidWithEdges(wallGeoY, getMat('column'));
                    rightWall.position.set(totalWidth, yPos, totalDepth/2);
                    buildingGroup.add(rightWall);
                }

                // Draw standard columns
                for (let x = 0; x <= params.gridCountX; x++) {
                    for (let y = 0; y <= params.gridCountY; y++) {
                        const isPerimeter = (x === 0 || x === params.gridCountX || y === 0 || y === params.gridCountY);
                        
                        // If it's a basement, skip perimeter columns (shear walls are there instead)
                        if (isBasement && isPerimeter) continue;

                        const col = createSolidWithEdges(colGeo, getMat('column'));
                        col.position.set(x * params.spanX, yPos, y * params.spanY);
                        buildingGroup.add(col);
                    }
                }
            }

            // 2. Slabs & Floors
            for (let s = -params.basementCount + 1; s <= params.storyCount; s++) {
                const floorY = s * params.storyHeight;

                // --- FLAT SLAB ---
                if (params.slabType === 'Flat Slab') {
                    const slabGeo = new THREE.BoxGeometry(boundMaxX - boundMinX, params.flatThickness, boundMaxY - boundMinY);
                    const slab = createSolidWithEdges(slabGeo, getMat('slab'));
                    slab.position.set(totalWidth/2, floorY - params.flatThickness/2, totalDepth/2);
                    buildingGroup.add(slab);

                    const capSize = params.columnSize * 2;
                    const capThickness = 0.1;
                    
                    for (let x = 0; x <= params.gridCountX; x++) {
                        for (let y = 0; y <= params.gridCountY; y++) {
                            const minX = Math.max(boundMinX, x * params.spanX - capSize/2);
                            const maxX = Math.min(boundMaxX, x * params.spanX + capSize/2);
                            const minY = Math.max(boundMinY, y * params.spanY - capSize/2);
                            const maxY = Math.min(boundMaxY, y * params.spanY + capSize/2);
                            
                            const capGeo = new THREE.BoxGeometry(maxX - minX, capThickness, maxY - minY);
                            const cap = createSolidWithEdges(capGeo, getMat('drop'));
                            cap.position.set((minX+maxX)/2, floorY - params.flatThickness - capThickness/2, (minY+maxY)/2);
                            buildingGroup.add(cap);
                        }
                    }
                } 
                
                // --- SLAB WITH BEAMS ---
                else if (params.slabType === 'Slab with Beams') {
                    const slabGeo = new THREE.BoxGeometry(boundMaxX - boundMinX, params.beamSlabThickness, boundMaxY - boundMinY);
                    const slab = createSolidWithEdges(slabGeo, getMat('slab'));
                    slab.position.set(totalWidth/2, floorY - params.beamSlabThickness/2, totalDepth/2);
                    buildingGroup.add(slab);

                    const beamDepth = params.beamSlabThickness * 2;
                    const beamGeoX = new THREE.BoxGeometry(boundMaxX - boundMinX, beamDepth, params.columnSize);
                    for(let y=0; y<=params.gridCountY; y++) {
                        const beam = createSolidWithEdges(beamGeoX, getMat('beam'));
                        beam.position.set(totalWidth/2, floorY - params.beamSlabThickness - beamDepth/2, y * params.spanY);
                        buildingGroup.add(beam);
                    }
                    
                    const beamGeoY = new THREE.BoxGeometry(params.columnSize, beamDepth, boundMaxY - boundMinY);
                    for(let x=0; x<=params.gridCountX; x++) {
                        const beam = createSolidWithEdges(beamGeoY, getMat('beam'));
                        beam.position.set(x * params.spanX, floorY - params.beamSlabThickness - beamDepth/2, totalDepth/2);
                        buildingGroup.add(beam);
                    }
                }

                // --- WAFFLE SLAB ---
                else if (params.slabType === 'Waffle Slab') {
                    const slabGeo = new THREE.BoxGeometry(boundMaxX - boundMinX, params.wafflePlateThickness, boundMaxY - boundMinY);
                    const slab = createSolidWithEdges(slabGeo, getMat('slab'));
                    slab.position.set(totalWidth/2, floorY - params.wafflePlateThickness/2, totalDepth/2);
                    buildingGroup.add(slab);

                    const dropW = params.spanX / 3;
                    const dropD = params.spanY / 3;

                    // 1. Trimmed Solid Drops around columns
                    for (let x = 0; x <= params.gridCountX; x++) {
                        for (let y = 0; y <= params.gridCountY; y++) {
                            const minX = Math.max(boundMinX, x * params.spanX - dropW/2);
                            const maxX = Math.min(boundMaxX, x * params.spanX + dropW/2);
                            const minY = Math.max(boundMinY, y * params.spanY - dropD/2);
                            const maxY = Math.min(boundMaxY, y * params.spanY + dropD/2);

                            const dropGeo = new THREE.BoxGeometry(maxX - minX, params.waffleRibHeight, maxY - minY);
                            const drop = createSolidWithEdges(dropGeo, getMat('drop'));
                            drop.position.set((minX+maxX)/2, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, (minY+maxY)/2);
                            buildingGroup.add(drop);
                        }
                    }

                    // 2. Solid Beams between columns
                    const waffleBeamGeoX = new THREE.BoxGeometry(boundMaxX - boundMinX, params.waffleRibHeight, params.columnSize);
                    for(let y=0; y<=params.gridCountY; y++) {
                        const beam = createSolidWithEdges(waffleBeamGeoX, getMat('drop'));
                        beam.position.set(totalWidth/2, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, y * params.spanY);
                        buildingGroup.add(beam);
                    }
                    
                    const waffleBeamGeoY = new THREE.BoxGeometry(params.columnSize, params.waffleRibHeight, boundMaxY - boundMinY);
                    for(let x=0; x<=params.gridCountX; x++) {
                        const beam = createSolidWithEdges(waffleBeamGeoY, getMat('drop'));
                        beam.position.set(x * params.spanX, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, totalDepth/2);
                        buildingGroup.add(beam);
                    }

                    // 3. Trimmed Ribs (Avoiding Drop Panels and Solid Beams)
                    // X axis ribs
                    for(let ry=0; ry<=totalDepth; ry+=params.waffleRibSpacing) {
                        let nearestGridY = Math.round(ry / params.spanY);
                        if (Math.abs(ry - nearestGridY * params.spanY) <= params.columnSize/2 + 0.01) continue;

                        let dMinY = Math.max(boundMinY, nearestGridY * params.spanY - dropD/2);
                        let dMaxY = Math.min(boundMaxY, nearestGridY * params.spanY + dropD/2);
                        let hitsDrops = (ry >= dMinY - 0.01 && ry <= dMaxY + 0.01);

                        if (hitsDrops) {
                            for (let cx = 0; cx < params.gridCountX; cx++) {
                                let startX = Math.min(boundMaxX, cx * params.spanX + dropW/2);
                                let endX = Math.max(boundMinX, (cx+1) * params.spanX - dropW/2);
                                if (endX > startX) {
                                    let ribGeo = new THREE.BoxGeometry(endX - startX, params.waffleRibHeight, params.waffleRibWidth);
                                    let rib = createSolidWithEdges(ribGeo, getMat('rib'));
                                    rib.position.set((startX+endX)/2, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, ry);
                                    buildingGroup.add(rib);
                                }
                            }
                        } else {
                            let ribGeo = new THREE.BoxGeometry(boundMaxX - boundMinX, params.waffleRibHeight, params.waffleRibWidth);
                            let rib = createSolidWithEdges(ribGeo, getMat('rib'));
                            rib.position.set(totalWidth/2, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, ry);
                            buildingGroup.add(rib);
                        }
                    }

                    // Y axis ribs
                    for(let rx=0; rx<=totalWidth; rx+=params.waffleRibSpacing) {
                        let nearestGridX = Math.round(rx / params.spanX);
                        if (Math.abs(rx - nearestGridX * params.spanX) <= params.columnSize/2 + 0.01) continue; 

                        let dMinX = Math.max(boundMinX, nearestGridX * params.spanX - dropW/2);
                        let dMaxX = Math.min(boundMaxX, nearestGridX * params.spanX + dropW/2);
                        let hitsDrops = (rx >= dMinX - 0.01 && rx <= dMaxX + 0.01);

                        if (hitsDrops) {
                            for (let cy = 0; cy < params.gridCountY; cy++) {
                                let startY = Math.min(boundMaxY, cy * params.spanY + dropD/2);
                                let endY = Math.max(boundMinY, (cy+1) * params.spanY - dropD/2);
                                if (endY > startY) {
                                    let ribGeo = new THREE.BoxGeometry(params.waffleRibWidth, params.waffleRibHeight, endY - startY);
                                    let rib = createSolidWithEdges(ribGeo, getMat('rib'));
                                    rib.position.set(rx, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, (startY+endY)/2);
                                    buildingGroup.add(rib);
                                }
                            }
                        } else {
                            let ribGeo = new THREE.BoxGeometry(params.waffleRibWidth, params.waffleRibHeight, boundMaxY - boundMinY);
                            let rib = createSolidWithEdges(ribGeo, getMat('rib'));
                            rib.position.set(rx, floorY - params.wafflePlateThickness - params.waffleRibHeight/2, totalDepth/2);
                            buildingGroup.add(rib);
                        }
                    }
                }

                // --- POST-TENSIONED ---
                else if (params.slabType === 'Post-tensioned') {
                    const slabGeo = new THREE.BoxGeometry(boundMaxX - boundMinX, params.flatThickness, boundMaxY - boundMinY);
                    const slab = createSolidWithEdges(slabGeo, getMat('slab'));
                    slab.position.set(totalWidth/2, floorY - params.flatThickness/2, totalDepth/2);
                    buildingGroup.add(slab);

                    const cableSpacing = 1.0;
                    
                    // X-Direction Tendons
                    for(let y=0; y<=totalDepth; y+=cableSpacing) {
                        for(let x=0; x<params.gridCountX; x++) {
                            const start = new THREE.Vector3(x * params.spanX, floorY - 0.05, y);
                            const end = new THREE.Vector3((x+1) * params.spanX, floorY - 0.05, y);
                            const mid = new THREE.Vector3((x+0.5) * params.spanX, floorY - params.flatThickness + 0.05, y); 
                            
                            const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
                            const tubeGeo = new THREE.TubeGeometry(curve, 24, 0.03, 6, false);
                            const ptTube = new THREE.Mesh(tubeGeo, getMat('pt'));
                            buildingGroup.add(ptTube);
                        }
                    }

                    // Y-Direction Tendons
                    for(let x=0; x<=totalWidth; x+=cableSpacing) {
                        for(let y=0; y<params.gridCountY; y++) {
                            const start = new THREE.Vector3(x, floorY - 0.05, y * params.spanY);
                            const end = new THREE.Vector3(x, floorY - 0.05, (y+1) * params.spanY);
                            const mid = new THREE.Vector3(x, floorY - params.flatThickness + 0.05, (y+0.5) * params.spanY); 
                            
                            const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
                            const tubeGeo = new THREE.TubeGeometry(curve, 24, 0.03, 6, false);
                            const ptTube = new THREE.Mesh(tubeGeo, getMat('pt'));
                            buildingGroup.add(ptTube);
                        }
                    }
                }

                // --- PRE-TENSIONED DOUBLE TEES ---
                else if (params.slabType === 'Pre-tensioned Precast (Double Tee)') {
                    const dtWidth = 2.0; 
                    const dtFlangeThickness = 0.1;
                    const dtWebDepth = 0.6;
                    const dtWebThickness = 0.15;
                    const supportBeamDepth = 0.8;

                    // 1. Support Beams on ALL Grid Lines (X & Y)
                    const beamGeoX = new THREE.BoxGeometry(boundMaxX - boundMinX, supportBeamDepth, params.columnSize);
                    for(let y=0; y<=params.gridCountY; y++) {
                        const beam = createSolidWithEdges(beamGeoX, getMat('beam'));
                        beam.position.set(totalWidth/2, floorY - supportBeamDepth/2, y * params.spanY);
                        buildingGroup.add(beam);
                    }
                    
                    const beamGeoY = new THREE.BoxGeometry(params.columnSize, supportBeamDepth, boundMaxY - boundMinY);
                    for(let x=0; x<=params.gridCountX; x++) {
                        const beam = createSolidWithEdges(beamGeoY, getMat('beam'));
                        beam.position.set(x * params.spanX, floorY - supportBeamDepth/2, totalDepth/2);
                        buildingGroup.add(beam);
                    }

                    // 2. Adaptive Double Tees (Spanning Longer Direction)
                    const isXLonger = params.spanX >= params.spanY;

                    if (isXLonger) {
                        const dtClearSpanX = params.spanX - params.columnSize;
                        for(let x=0; x<params.gridCountX; x++) {
                            const dtCenterX = x * params.spanX + params.spanX/2; 
                            for(let y=0; y<totalDepth; y+=dtWidth) {
                                const flangeGeo = new THREE.BoxGeometry(dtClearSpanX, dtFlangeThickness, dtWidth - 0.04);
                                const flange = createSolidWithEdges(flangeGeo, getMat('dt'));
                                flange.position.set(dtCenterX, floorY - dtFlangeThickness/2, y + dtWidth/2);
                                buildingGroup.add(flange);

                                const webGeo = new THREE.BoxGeometry(dtClearSpanX, dtWebDepth, dtWebThickness);
                                const web1 = createSolidWithEdges(webGeo, getMat('dt'));
                                web1.position.set(dtCenterX, floorY - dtFlangeThickness - dtWebDepth/2, y + dtWidth*0.25);
                                buildingGroup.add(web1);

                                const web2 = createSolidWithEdges(webGeo, getMat('dt'));
                                web2.position.set(dtCenterX, floorY - dtFlangeThickness - dtWebDepth/2, y + dtWidth*0.75);
                                buildingGroup.add(web2);
                            }
                        }
                    } else {
                        const dtClearSpanY = params.spanY - params.columnSize;
                        for(let y=0; y<params.gridCountY; y++) {
                            const dtCenterY = y * params.spanY + params.spanY/2; 
                            for(let x=0; x<totalWidth; x+=dtWidth) {
                                const flangeGeo = new THREE.BoxGeometry(dtWidth - 0.04, dtFlangeThickness, dtClearSpanY);
                                const flange = createSolidWithEdges(flangeGeo, getMat('dt'));
                                flange.position.set(x + dtWidth/2, floorY - dtFlangeThickness/2, dtCenterY);
                                buildingGroup.add(flange);

                                const webGeo = new THREE.BoxGeometry(dtWebThickness, dtWebDepth, dtClearSpanY);
                                const web1 = createSolidWithEdges(webGeo, getMat('dt'));
                                web1.position.set(x + dtWidth*0.25, floorY - dtFlangeThickness - dtWebDepth/2, dtCenterY);
                                buildingGroup.add(web1);

                                const web2 = createSolidWithEdges(webGeo, getMat('dt'));
                                web2.position.set(x + dtWidth*0.75, floorY - dtFlangeThickness - dtWebDepth/2, dtCenterY);
                                buildingGroup.add(web2);
                            }
                        }
                    }
                }
            }
            
            controls.target.set(totalWidth/2, (params.storyCount * params.storyHeight)/2, totalDepth/2);
        }

        // --- GUI Setup ---
        const gui = new GUI({ title: 'Menu' });

        const folderMat = gui.addFolder('Global Settings');
        folderMat.add(params, 'structuralMaterial', ['Reinforced Concrete']).name('Material');

        const folderGeneral = gui.addFolder('Grid & Columns');
        folderGeneral.add(params, 'storyCount', 1, 10, 1).name('Story Count').onChange(generateBuilding);
        folderGeneral.add(params, 'basementCount', 0, 2, 1).name('Basements').onChange(generateBuilding);
        folderGeneral.add(params, 'storyHeight', 2.5, 6.0, 0.1).name('Story Height (m)').onChange(generateBuilding);
        folderGeneral.add(params, 'gridCountX', 1, 10, 1).name('Grid Count X').onChange(generateBuilding);
        folderGeneral.add(params, 'gridCountY', 1, 10, 1).name('Grid Count Y').onChange(generateBuilding);
        folderGeneral.add(params, 'spanX', 3, 20, 0.5).name('X Span Length (m)').onChange(generateBuilding);
        folderGeneral.add(params, 'spanY', 3, 20, 0.5).name('Y Span Length (m)').onChange(generateBuilding);
        folderGeneral.add(params, 'columnSize', 0.2, 1.5, 0.05).name('Column Size (m)').onChange(generateBuilding);

        const folderSlab = gui.addFolder('Slab System');
        folderSlab.add(params, 'slabType', [
            'Flat Slab', 'Slab with Beams', 'Waffle Slab', 'Post-tensioned', 'Pre-tensioned Precast (Double Tee)'
        ]).name('System Type').onChange(() => {
            updateDynamicGUI();
            generateBuilding();
        });

        let dynamicFolder;
        function updateDynamicGUI() {
            if(dynamicFolder) dynamicFolder.destroy();
            
            if (params.slabType === 'Flat Slab' || params.slabType === 'Post-tensioned') {
                dynamicFolder = folderSlab.addFolder('Flat Slab Details');
                dynamicFolder.add(params, 'flatThickness', 0.1, 0.8, 0.01).name('Thickness (m)').onChange(generateBuilding);
            } 
            else if (params.slabType === 'Slab with Beams') {
                dynamicFolder = folderSlab.addFolder('Beam & Slab Details');
                dynamicFolder.add(params, 'beamSlabThickness', 0.1, 0.5, 0.01).name('Slab Thickness (m)').onChange(generateBuilding);
            }
            else if (params.slabType === 'Waffle Slab') {
                dynamicFolder = folderSlab.addFolder('Waffle Details');
                dynamicFolder.add(params, 'wafflePlateThickness', 0.05, 0.3, 0.01).name('Plate Thickness').onChange(generateBuilding);
                dynamicFolder.add(params, 'waffleRibSpacing', 0.5, 3.0, 0.1).name('Rib Spacing').onChange(generateBuilding);
                dynamicFolder.add(params, 'waffleRibWidth', 0.1, 0.4, 0.01).name('Rib Width').onChange(generateBuilding);
                dynamicFolder.add(params, 'waffleRibHeight', 0.2, 1.0, 0.05).name('Rib Height').onChange(generateBuilding);
            }
        }

        const folderView = gui.addFolder('Visualization & Export');
        
        folderView.add(params, 'cutAxis', ['X-Axis (Width)', 'Y-Axis (Depth)']).name('Cut Direction').onChange((val) => {
            if (val === 'X-Axis (Width)') {
                sectionPlane.normal.set(-1, 0, 0);
            } else {
                sectionPlane.normal.set(0, 0, -1);
            }
        });
        
        folderView.add(params, 'sectionCut', -10, 100, 0.5).name('Slide Section Cut').onChange((val) => {
            sectionPlane.constant = val;
        });
        
        const folderFile = gui.addFolder('Save & Load');
        folderFile.add(fileActions, 'saveProgress').name('Save Design (.json)');
        folderFile.add(fileActions, 'loadProgress').name('Load Design (.json)');

        const viewActions = {
            snapToSection: function() {
                const cutVal = params.sectionCut;
                const dist = 25; // Pull camera back 25m to see the whole building
                const centerX = (params.gridCountX * params.spanX) / 2;
                const centerZ = (params.gridCountY * params.spanY) / 2;
                const targetY = (params.storyCount * params.storyHeight) / 2;

                if (params.cutAxis === 'X-Axis (Width)') {
                    camera.position.set(cutVal + dist, targetY, centerZ);
                    controls.target.set(cutVal, targetY, centerZ);
                } else {
                    camera.position.set(centerX, targetY, cutVal + dist);
                    controls.target.set(centerX, targetY, cutVal);
                }
                controls.update();
            }
        };

        folderView.add(viewActions, 'snapToSection').name('Snap View to Cut');

        folderView.add(params, 'colorCoded').name('Color Coded Elements').onChange(() => {
            materials.column.color.setHex(params.colorCoded ? 0x4a6fa5 : 0xcccccc);
            materials.slab.color.setHex(params.colorCoded ? 0xdde6ed : 0xcccccc);
            materials.beam.color.setHex(params.colorCoded ? 0x164863 : 0xcccccc);
            materials.drop.color.setHex(params.colorCoded ? 0x9db2bf : 0xcccccc);
            materials.rib.color.setHex(params.colorCoded ? 0xdde6ed : 0xcccccc);
            materials.dt.color.setHex(params.colorCoded ? 0x8fbc8f : 0xcccccc);
            generateBuilding();
        });
        
        folderView.add(exportActions, 'exportOBJ').name('Export to .OBJ');

        updateDynamicGUI();
        generateBuilding();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            capMesh.position.copy(sectionPlane.normal).multiplyScalar(-sectionPlane.constant);
            capMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), sectionPlane.normal);
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
